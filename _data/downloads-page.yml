- htmlsection: announcement
  title: Qubes OS User Survey 2026: Shape the future of Qubes! (10-20 minutes)
  paragraph: Whether you're a long-time Qubes user or haven't even installed it yet, we want to hear about your experiences and about what matters to you. Help us make Qubes the best reasonably secure operating system it can be. If you've ever wanted to influence the development of Qubes, now is your chance. Make your voice heard! (Note: This survey is fully anonymous. We do not collect any data except for the answers you provide.)
  url: https://pad.itl.space/form/#/2/form/view/4+jrJP2pyim2EyFwrbXrOVbQpzUg71Kt+DWR6p2M3IU/
  text: Qubes OS User Survey 2026

- htmlsection: loop-releases
  releases:
    - r_version: testing
      snippets:
        - snippet: This is a testing release.
          url: /doc/testing/
        - snippet: Please help us improve it by reporting any bugs you encounter. For important work, we recommend the latest stable release.
    - r_version: stable
      snippets:
        - snippet: This is the latest stable Qubes OS release. We recommend this release for all new and existing users.
    - r_version: old
      snippets:
        - snippet: This is an older, supported release. For the best Qubes OS experience, consider upgrading to the latest stable release.
    - r_version: deprecated
      snippets:
        - snippet: This is an old, unsupported release. We strongly advise upgrading to a supported release in order to receive the latest security updates.

